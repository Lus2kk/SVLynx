<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#080c1a">
    <title>SVLynx — Мессенджер</title>
    <meta name="description" content="SVLynx — быстрый и безопасный мессенджер. Общайтесь в реальном времени.">
    <meta property="og:title" content="SVLynx — Мессенджер">
    <meta property="og:description" content="Быстрый и безопасный мессенджер для общения в реальном времени.">
    <meta property="og:image" content="https://svlynx.site/favicon.png">
    <meta property="og:url" content="https://svlynx.site">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="SVLynx — Мессенджер">
    <meta name="twitter:description" content="Быстрый и безопасный мессенджер.">
    <meta name="twitter:image" content="https://svlynx.site/favicon.png">
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        overflow: hidden;
      }
      #app {
        width: 100%;
        height: 100%;
        flex: 1;
        display: flex;
        flex-direction: column;
      }
    </style>
    <script>
      const isLight = localStorage.getItem('svlynx-theme') === 'light'
      const color = isLight ? '#ffffff' : 'rgb(8, 12, 26)'
      document.documentElement.style.background = color
      document.querySelector('meta[name="theme-color"]').setAttribute('content', color)
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
